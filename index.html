<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our World ❤️</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>❤️ Our World ❤️</h1>
<h2>Ahmet & Lhana</h2>

<div class="card">
<h3>🎲 Random Date Idea</h3>

<p id="idea">Press the button ❤️</p>

<button onclick="newIdea()">Generate</button>
</div>


<div class="card">

<h3>💌 Love Note</h3>

<textarea id="note"></textarea>

<br><br>

<button onclick="saveNote()">Save</button>

<p id="saved"></p>

</div>

<div class="card">

<h3>❤️ Why I Love You</h3>

<p id="loveReason">
Press the button ❤️
</p>

<button onclick="whyILoveYou()">
Tell Me
</button>

</div>


<div class="card">

<h3>🎬 Movie Night</h3>

<p id="movie">
Press Random Movie
</p>

<button onclick="randomMovie()">
Random Movie
</button>

</div>


<div class="card">

<h3>❓ Daily Question</h3>

<p id="question"></p>

<button onclick="newQuestion()">
New Question
</button>

</div>
<div class="card">

<h3>🎵 Shared Playlist</h3>

<a href="https://open.spotify.com/playlist/6ivRkoll4Dn0EyP1pgxkLV?si=GDk9AtIMROSBIkagx9M93Q&pi=EjwCfl6mR5qaF">
Open Playlist 🎵
</a>

</div>

<div class="card">

<h3>🎬 Movie Night</h3>

<img id="poster" width="250">

<h2 id="title"></h2>

<p id="rating"></p>

<p id="overview"></p>

<button onclick="getMovie()">
🍿 Random Movie
</button>

</div>

<div class="card">

<h3>📸 Memories</h3>

<img src="images/istanbul.jpg" width="250">

<br><br>

<img src="images/unye.jpg" width="250">

</div>

<div class="card">

<h3>⏳ Next Meeting</h3>

<p id="countdown"></p>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
