<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film Keşfi ve İzleme Listesi</title>
    <style>
        :root {
            --bg-color: #141414;
            --text-color: #ffffff;
            --accent-color: #e50914;
            --card-bg: #1f1f1f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: var(--accent-color);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            margin-top: 40px;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .movie-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            transition: transform 0.2s;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .movie-card:hover {
            transform: scale(1.05);
        }

        .movie-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .movie-info {
            padding: 10px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .movie-title {
            font-size: 1rem;
            margin: 0 0 10px 0;
            font-weight: bold;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #b80710;
        }

        .btn-remove {
            background-color: #555;
        }

        .btn-remove:hover {
            background-color: #333;
        }

        .loading {
            text-align: center;
            font-style: italic;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Sinema Odası</h1>
        <p>Keşfet, Beğen ve Buluta Kaydet!</p>
    </header>

    <!-- TMDB POPÜLER FİLMLER -->
    <h2 class="section-title">Popüler Filmler</h2>
    <div id="loading-discover" class="loading">Filmler yükleniyor...</div>
    <div class="movie-grid" id="discover-grid"></div>

    <!-- JSONBIN DAHA SONRA İZLE LİSTESİ -->
    <h2 class="section-title">Daha Sonra İzle (Bulut Listem)</h2>
    <div id="loading-watchlist" class="loading">Listeniz buluttan çekiliyor...</div>
    <div class="movie-grid" id="watchlist-grid"></div>
</div>

<script>
    // --- GEREKLİ AYARLARINIZI BURAYA GİRİN ---
    const TMDB_API_KEY = '7839bbaac4069c03fe69c550163506ac'; 
    const JSONBIN_API_KEY = '$2a$10$U43tcsm91jg0By819l2cEOrlLnZ1P7Osh6JvI/pMlwr6ef6Y1c6fO'; // JSONBin Master Key veya Access Key'iniz
    const JSONBIN_BIN_ID = '6a3eb765da38895dfe03d898';  // JSONBin Bin ID'niz

    // Global İzleme Listesi Dizisi
    let watchLaterList = [];

    // 1. TMDB'den Popüler Filmleri Çekme
    async function fetchDiscoverMovies() {
        const url = `https://api.themoviedb.org/3/movie/popular?api_key=${TMDB_API_KEY}&language=tr-TR&page=1`;
        try {
            const response = await fetch(url);
            const data = await response.json();
            document.getElementById('loading-discover').style.display = 'none';
            displayDiscoverMovies(data.results);
        } catch (error) {
            console.error("TMDB Verisi çekilemedi:", error);
            document.getElementById('loading-discover').innerText = "Filmler yüklenirken bir hata oluştu.";
        }
    }

    // Popüler Filmleri Ekrana Basma
    function displayDiscoverMovies(movies) {
        const grid = document.getElementById('discover-grid');
        grid.innerHTML = '';

        movies.forEach(movie => {
            const posterPath = movie.poster_path ? `https://image.tmdb.org/t/p/w500${movie.poster_path}` : 'https://via.placeholder.com/500x750?text=Resim+Yok';
            
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = `
                <img src="${posterPath}" alt="${movie.title}">
                <div class="movie-info">
                    <p class="movie-title">${movie.title}</p>
                    <button class="btn" onclick="addToWatchLater(${movie.id}, '${movie.title.replace(/'/g, "\\'")}', '${movie.poster_path}')">Listeye Ekle</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // 2. JSONBin'den Kayıtlı Listeyi Çekme (GET)
    async function loadWatchLaterList() {
        const url = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`;
        try {
            const response = await fetch(url, {
                method: 'GET',
                headers: {
                    'X-Master-Key': JSONBIN_API_KEY
                }
            });
            const data = await response.json();
            // JSONBin v3 formatında veri "record" anahtarı altında gelir
            watchLaterList = data.record || [];
            document.getElementById('loading-watchlist').style.display = 'none';
            displayWatchList();
        } catch (error) {
            console.error("JSONBin'den liste alınamadı:", error);
            document.getElementById('loading-watchlist').innerText = "Kayıtlı listeniz yüklenemedi.";
        }
    }

    // 3. JSONBin'e Güncel Listeyi Kaydetme (PUT)
    async function saveWatchLaterList() {
        const url = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;
        try {
            await fetch(url, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': JSONBIN_API_KEY
                },
                body: JSON.stringify(watchLaterList)
            });
            console.log("Liste buluta başarıyla kaydedildi.");
        } catch (error) {
            console.error("Buluta kaydetme hatası:", error);
            alert("Değişiklikler buluta kaydedilirken bir hata oluştu!");
        }
    }

    // İzleme Listesini Ekrana Basma
    function displayWatchList() {
        const grid = document.getElementById('watchlist-grid');
        grid.innerHTML = '';

        if (watchLaterList.length === 0) {
            grid.innerHTML = '<p style="color: #666; grid-column: 1/-1; text-align: center;">Listenizde henüz film yok.</p>';
            return;
        }

        watchLaterList.forEach(movie => {
            const posterPath = movie.poster_path ? `https://image.tmdb.org/t/p/w500${movie.poster_path}` : 'https://via.placeholder.com/500x750?text=Resim+Yok';
            
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = `
                <img src="${posterPath}" alt="${movie.title}">
                <div class="movie-info">
                    <p class="movie-title">${movie.title}</p>
                    <button class="btn btn-remove" onclick="removeFromWatchLater(${movie.id})">Listeden Kaldır</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // Listeye Yeni Film Ekleme Fonksiyonu
    async function addToWatchLater(id, title, poster_path) {
        // Film zaten listede var mı kontrolü
        if (watchLaterList.some(movie => movie.id === id)) {
            alert("Bu film zaten izleme listenizde var!");
            return;
        }

        const newMovie = { id, title, poster_path };
        watchLaterList.push(newMovie); // Yerel diziyi güncelle
        displayWatchList();            // Arayüzü güncelle
        await saveWatchLaterList();    // Sunucuyu güncelle
    }

    // Listeden Film Çıkarma Fonksiyonu
    async function removeFromWatchLater(id) {
        watchLaterList = watchLaterList.filter(movie => movie.id !== id); // Yerel diziden sil
        displayWatchList();                 // Arayüzü güncelle
        await saveWatchLaterList();         // Sunucuyu güncelle
    }

    // Sayfa Açıldığında Çalışacak Fonksiyonlar
    window.onload = function() {
        fetchDiscoverMovies();
        loadWatchLaterList();
    };
</script>

</body>
</html>
